name: Build & Package

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        ruby-version: ['3.1', '3.2', '3.3']
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Ruby ${{ matrix.ruby-version }}
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ matrix.ruby-version }}
          bundler-cache: true
      
      - name: Validate gemspec
        run: gem specification globiguard.gemspec
      
      - name: Build gem
        run: |
          mkdir -p dist
          gem build globiguard.gemspec --output dist/globiguard-$(grep 'spec.version' globiguard.gemspec | grep -o '"[^"]*"' | tr -d '"').gem
      
      - name: Verify gem contents
        run: |
          ls -lh dist/
          gem unpack dist/*.gem -d dist/unpacked || true
      
      - name: Upload artifacts
        uses: actions/upload-artifact@v3
        with:
          name: ruby-dist-ruby${{ matrix.ruby-version }}
          path: dist/
          retention-days: 5
